name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "main.py"
      - "buildozer.spec"
      - "buildozer-32bit.spec"
      - "buildozer-64bit.spec"
      - ".github/workflows/android-apk.yml"

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: "armeabi-v7a"
            spec: "buildozer-32bit.spec"
          - arch: "arm64-v8a"
            spec: "buildozer-64bit.spec"
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.36 buildozer

      - name: Build debug APK
        run: |
          cp "${{ matrix.spec }}" buildozer.spec
          buildozer -v android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mortgage-calculator-apk-${{ matrix.arch }}
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 14
